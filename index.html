<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Font Generator - Fancy Text Styles</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1e1e2e 0%, #2d2d44 100%);
            min-height: 100vh;
            color: #fff;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            padding: 40px 0;
        }

        h1 {
            font-size: 3em;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .subtitle {
            color: #888;
            font-size: 1.1em;
        }

        .input-section {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 30px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid #4ecdc4;
            border-radius: 12px;
            background: rgba(0,0,0,0.3);
            color: #fff;
            outline: none;
            transition: all 0.3s;
        }

        input[type="text"]:focus {
            border-color: #ff6b6b;
            box-shadow: 0 0 20px rgba(78,205,196,0.3);
        }

        .hint {
            text-align: center;
            color: #666;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .results {
            display: grid;
            gap: 15px;
        }

        .style-card {
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255,255,255,0.1);
            transition: transform 0.2s, background 0.2s;
        }

        .style-card:hover {
            transform: translateY(-2px);
            background: rgba(255,255,255,0.08);
        }

        .style-card.featured {
            border: 2px solid #ff6b6b;
            background: rgba(255,107,107,0.1);
        }

        .style-name {
            font-size: 0.8em;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 5px;
        }

        .style-text {
            font-size: 1.5em;
            word-break: break-all;
        }

        .copy-btn {
            background: linear-gradient(45deg, #ff6b6b, #ff8e8e);
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s;
            min-width: 80px;
        }

        .copy-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,107,107,0.4);
        }

        .copy-btn.copied {
            background: linear-gradient(45deg, #4ecdc4, #44a08d);
        }

        @media (max-width: 600px) {
            h1 { font-size: 2em; }
            .style-text { font-size: 1.2em; }
            .style-card { flex-direction: column; gap: 10px; text-align: center; }
        }
    </style>
</head>

            <p class="subtitle">Convert your text to fancy Unicode styles</p>

        function convert(text, map) {
            return text.toLowerCase().split('').map(char => map[char] || char).join('');
        }

        function generate() {
            const text = document.getElementById('input').value || 'Benjie';
            const container = document.getElementById('results');
            container.innerHTML = '';

            for (const [name, config] of Object.entries(fonts)) {
                let output;
                let isFeatured = false;

                if (config.custom) {
                    output = config.transform(text);
                    isFeatured = true;
                } else {
                    output = convert(text, config);
                }

                const card = document.createElement('div');
                card.className = `style-card ${isFeatured ? 'featured' : ''}`;
                card.innerHTML = `
                    <div>
                        <div class="style-name">${name} ${isFeatured ? 'вӯҗ' : ''}</div>
                        <div class="style-text">${output}</div>
                    </div>
                    <button class="copy-btn" onclick="copyText('${output.replace(/'/g, "\\'")}', this)">Copy</button>
                `;
                container.appendChild(card);
            }
        }

        async function copyText(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                btn.textContent = 'Copied!';
                btn.classList.add('copied');
                setTimeout(() => {
                    btn.textContent = 'Copy';
                    btn.classList.remove('copied');
                }, 2000);
            } catch (err) {
                const textarea = document.createElement('textarea');
                textarea.value = text;
                document.body.appendChild(textarea);
                textarea.select();
                document.execCommand('copy');
                document.body.removeChild(textarea);
                btn.textContent = 'Copied!';
                setTimeout(() => btn.textContent = 'Copy', 2000);
            }
        }

        generate();
    </script>
